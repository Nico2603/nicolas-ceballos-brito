<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Nicolás Ceballos Brito</title>
    <script>
      const segment = '/nicolas-ceballos-brito/'
      const path = location.pathname.replace(segment, '/')
      const redirect = segment + (path || '') + location.search + location.hash
      sessionStorage.setItem('redirect', redirect)
      location.replace(segment)
    </script>
  </head>
  <body></body>
</html>
